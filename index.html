<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://familybridgeapp.lovable.app/" />
    
    <title>FamilyBridge - Recovery Support for Families</title>
    <meta name="description" content="FamilyBridge helps families support loved ones in recovery with AI-powered pattern detection, transparent communication, financial coordination, and accountability tools." />
    <meta name="author" content="FamilyBridge" />
    <meta name="keywords" content="addiction recovery, family support, recovery app, sobriety, intervention, family communication, accountability, AI recovery tools, meeting check-in, recovery support platform" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="FamilyBridge - Recovery Support for Families" />
    <meta property="og:description" content="A safe space for families affected by addiction to communicate, set boundaries, and support their loved ones on the path to recovery with AI-powered insights." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://familybridgeapp.lovable.app/" />
    <meta property="og:image" content="https://familybridgeapp.lovable.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="FamilyBridge - Recovery Support for Families" />
    <meta property="og:site_name" content="FamilyBridge" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FamilyBridge - Recovery Support for Families" />
    <meta name="twitter:description" content="A safe space for families affected by addiction to communicate, set boundaries, and support their loved ones on the path to recovery." />
    <meta name="twitter:image" content="https://familybridgeapp.lovable.app/og-image.png" />
    <meta name="twitter:image:alt" content="FamilyBridge - Recovery Support for Families" />

    <!-- Mobile App Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FamilyBridge" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- JSON-LD Structured Data - Software Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FamilyBridge",
      "applicationCategory": "HealthApplication",
      "applicationSubCategory": "Recovery Support",
      "operatingSystem": "iOS, Android, Web",
      "description": "FamilyBridge helps families support loved ones in recovery with AI-powered pattern detection, transparent communication, financial coordination, and accountability tools.",
      "url": "https://familybridgeapp.lovable.app",
      "author": {
        "@type": "Organization",
        "name": "FamilyBridge",
        "url": "https://familybridgeapp.lovable.app"
      },
      "offers": {
        "@type": "Offer",
        "price": "19.99",
        "priceCurrency": "USD",
        "priceValidUntil": "2027-12-31",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "100",
        "bestRating": "5",
        "worstRating": "1"
      },
      "featureList": [
        "AI Pattern Intelligence",
        "AI-Powered Chat Moderation",
        "Smart Behavioral Insights",
        "Transparent Financial Requests",
        "Verified Meeting Check-Ins",
        "Professional Oversight Ready"
      ]
    }
    </script>

    <!-- JSON-LD Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FamilyBridge",
      "url": "https://familybridgeapp.lovable.app",
      "logo": "https://familybridgeapp.lovable.app/favicon.png",
      "description": "FamilyBridge helps families support loved ones in recovery with transparent communication, financial coordination, and accountability tools.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "matt@freedominterventions.com",
        "contactType": "customer support",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- JSON-LD Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FamilyBridge",
      "url": "https://familybridgeapp.lovable.app",
      "description": "Recovery support platform for families",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://familybridgeapp.lovable.app/meetings?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
